name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: bun install

      - name: Run validation
        run: bun run validate

  package-copilot-cowork:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Package Copilot Cowork plugin
        run: bun run package:copilot-cowork

      - name: Read miro plugin version
        run: echo "MIRO_VERSION=$(bun -e 'const plugin = await Bun.file(\"claude-plugins/miro/.claude-plugin/plugin.json\").json(); console.log(plugin.version);')" >> "$GITHUB_ENV"

      - name: Upload Copilot Cowork artifact
        uses: actions/upload-artifact@v4
        with:
          name: miro-copilot-cowork-package-${{ env.MIRO_VERSION }}
          path: dist/miro-copilot-cowork-${{ env.MIRO_VERSION }}.zip
          if-no-files-found: error
